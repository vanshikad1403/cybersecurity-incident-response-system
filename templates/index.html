<!DOCTYPE html>
<html>
<head>
    <title>Cybersecurity Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h1>🔐 Cybersecurity Incident Dashboard</h1>

<h2>Events</h2>
<table id="eventsTable">
<tr><th>ID</th><th>Type</th><th>Severity</th></tr>
</table>

<h2>Alerts</h2>
<table id="alertsTable">
<tr><th>ID</th><th>Type</th><th>Status</th></tr>
</table>

<h2>Add Mitigation Action</h2>

<!-- ✅ Wrap inside form (better handling) -->
<form id="actionForm">
    <input type="number" id="alert_id" placeholder="Alert ID" required>
    <input type="text" id="action_taken" placeholder="Action Taken" required>
    
    <!-- ✅ FIXED BUTTON -->
    <button type="submit" id="submitBtn">Submit</button>
</form>

<!-- ✅ Correct script path -->
<script src="/static/script.js"></script>

</body>
</html>
